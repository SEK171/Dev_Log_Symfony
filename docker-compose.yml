services:

  apache:
    build: ./apache
    ports:
      - "80:80"
    volumes:
      - ./php:/var/www/html
    depends_on:
      - php
    networks:
      - app-network

  php:
    build: ./php
    volumes:
      - ./php:/var/www/html
    environment:
      - APP_ENV=dev
      - DATABASE_URL=mysql://root:root@db:3306/dev_log
      - PHP_MEMORY_LIMIT=512M
    networks:
      - app-network

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network


volumes:
  db_data:

networks:
  app-network:
