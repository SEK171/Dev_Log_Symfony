services:

  apache:
    build: ./apache
    ports:
      - "80:80"
    volumes:
      - ./php:/var/www/html
    depends_on:
      - php
    networks:
      - app-network

  php:
    build: ./php
    volumes:
      - ./php:/var/www/html
    environment:
      - APP_ENV=dev
      - DATABASE_URL=mysql://root:root@db:3306/dev_log
      - PHP_MEMORY_LIMIT=512M
    networks:
      - app-network

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dev_log
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 15

  setup-database:
    build: ./php
    volumes:
      - ./php:/var/www/html
    environment:
      - APP_ENV=dev
      - DATABASE_URL=mysql://root:root@db:3306/dev_log
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      php bin/console doctrine:database:create --if-not-exists --no-interaction &&
      php bin/console doctrine:migrations:migrate --no-interaction &&
      php bin/console app:create-user admin admin --admin || true &&
      php bin/console app:create-user user1 user || true &&
      php bin/console app:create-user user2 user || true &&
      php bin/console app:import-logs
      "

volumes:
  db_data:

networks:
  app-network: